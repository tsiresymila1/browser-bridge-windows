<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scallable=0"/>
    <title>Error</title>
    <style>
        * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
          font-size: 14px;
        }

        html, body {
          height: 100%;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
            Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
          background: #f8f9fa;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 2rem;
        }

        .error-container {
          background: white;
          max-width: 400px;
          width: 100%;
          padding: 2rem;
          border-radius: 8px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.1);
          text-align: center;
        }

        .error-icon {
          font-size: 3rem;
          color: #dc3545;
          margin-bottom: 1rem;
        }

        .error-title {
          font-size: 1.5rem;
          font-weight: 600;
          margin-bottom: 0.5rem;
        }

        .error-message {
          font-size: 0.8rem;
          color: #6c757d;
          margin-bottom: 1.5rem;
        }

        .error-actions a {
          font-size: 0.8rem;
          display: inline-block;
          padding: 0.6rem 1.2rem;
          background: #0784A9;
          color: white;
          border-radius: 4px;
          text-decoration: none;
          transition: background 0.2s ease-in-out;
        }

        .error-actions a:hover {
          background: #045973;
        }

        @media (max-width: 480px) {
          .error-container {
            padding: 1.5rem;
          }

          .error-title {
            font-size: 1.3rem;
          }
          .error-message {
            font-size: 0.95rem;
          }
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Something went wrong</div>
    <div class="error-message">We couldn’t complete your request. Please try again later.</div>
    <div class="error-actions">
        <a href="#" onclick="window.location.reload();">Refresh</a>
    </div>
</div>
</body>
</html>
